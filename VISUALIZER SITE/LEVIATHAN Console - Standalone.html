  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e1; font-family: 'Space Grotesk', sans-serif; user-select: none; -webkit-user-select: none;\">\n\n  <!-- ======== HEADER ======== -->\n  <div style=\"display: flex; align-items: stretch; gap: 24px; padding: 14px 22px 10px 22px; border-bottom: 1px solid #161b24; flex-wrap: wrap;\">\n    <div style=\"display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 235px;\">\n      <div style=\"display: flex; align-items: baseline; gap: 8px;\">\n        <div style=\"font-size: 23px; font-weight: 700; letter-spacing: 0.22em;\">LEVIATHAN<\u002Fdiv>\n        <div style=\"width: 8px; height: 8px; background: #e8a33d; transform: rotate(45deg); animation: lvBlink 2.4s infinite;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.18em; color: #5b6472;\">TOTAL RECORD · 2011–2026 · SIX CORPORA, ONE SUBJECT<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display: flex; gap: 26px; align-items: center; flex: 1; justify-content: flex-end; flex-wrap: wrap;\">\n      <div style=\"display: flex; flex-direction: column; gap: 1px; align-items: flex-end;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 600; color: #e8a33d;\">{{ cMsgs }}<\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.2em; color: #5b6472;\">MESSAGES<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 1px; align-items: flex-end;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 600; color: #e8e6e1;\">{{ cThreads }}<\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.2em; color: #5b6472;\">THREADS<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 1px; align-items: flex-end;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 600; color: #e8e6e1;\">{{ cPlaces }}<\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.2em; color: #5b6472;\">PLACES<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 1px; align-items: flex-end;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 600; color: #4fc3e8;\">{{ cKm }}<\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.2em; color: #5b6472;\">KM TRACKED<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 1px; align-items: flex-end;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 19px; font-weight: 600; color: #e8e6e1;\">{{ cWorks }}<\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.2em; color: #5b6472;\">RATED WORKS<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======== TAB BAR ======== -->\n  <div style=\"display: flex; gap: 6px; padding: 8px 22px; border-bottom: 1px solid #161b24; align-items: center;\">\n    <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"6\">\n      <div onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">\n        <span style=\"opacity: 0.55; margin-right: 7px;\">{{ t.num }}<\u002Fspan>{{ t.label }}\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.14em; color: #3d4554;\">KEYS 1–9<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ======== STAGE ======== -->\n  <div style=\"flex: 1; position: relative; min-height: 0;\" data-screen-label=\"{{ stageLabel }}\">\n    <canvas ref=\"{{ canvasRef }}\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: crosshair;\"><\u002Fcanvas>\n\n    <!-- module chips -->\n    <div style=\"position: absolute; top: 12px; right: 16px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; max-width: 70%;\">\n      <sc-for list=\"{{ chips }}\" as=\"ch\" hint-placeholder-count=\"3\">\n        <div onclick=\"{{ ch.onClick }}\" style=\"{{ ch.style }}\">{{ ch.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- loading overlay -->\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; background: #07090d;\">\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.3em; color: #e8a33d;\">DECOMPRESSING CORPUS<\u002Fdiv>\n        <div style=\"width: 340px; height: 2px; background: #1a2029; overflow: hidden; position: relative;\">\n          <div style=\"position: absolute; top: 0; left: 0; width: 120px; height: 100%; background: linear-gradient(90deg, transparent, #e8a33d, transparent); animation: lvShimmer 1.1s linear infinite;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.16em; color: #5b6472; text-align: center; line-height: 1.9;\">181,650 MESSAGES · 6,185 LOCATION FIXES · 12,863 WATCHES<br>1,121 RATED WORKS · 2,210 DAYS OF RHETORIC · 41,971 KM<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <!-- ======== FOOTER ======== -->\n  <div style=\"display: flex; align-items: center; gap: 16px; padding: 7px 22px; border-top: 1px solid #161b24;\">\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: 0.12em; color: #6b7484;\">{{ hint }}<\u002Fdiv>\n    <div style=\"flex: 1;\"><\u002Fdiv>\n    <div style=\"font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.14em; color: #3d4554;\">LEVIATHAN CORPUS · SEMANTIC LOCATION · FINALFAVS<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900}}\">\nclass Component extends DCLogic {\n  state = {\n    loading: true,\n    tab: 'pulse',\n    cnt: { m: 0, t: 0, p: 0, k: 0, w: 0 },\n    clockMode: 'all',\n    atlasPlay: false,\n    atlasSpeed: 120,\n    atlasView: 'FULL',\n    lexMode: 'pack',\n    shelfCat: 'ALL',\n    weatherMode: 'rate',\n    weatherLayers: { love: true, prof: true, sorry: true, qual: true, imp: true, caps: true },\n    anniePlay: false,\n    annieSpeed: 1.4,\n    signalMusic: false\n  };\n\n  // ---------- constants ----------\n  COL = {\n    bg: '#07090d', panel: '#10141b', line: '#1d2430', grid: '#141a23',\n    txt: '#e8e6e1', dim: '#5b6472', faint: '#3d4554',\n    amber: '#e8a33d', amberHi: '#ffd28a', cyan: '#4fc3e8', cyanHi: '#a6e6ff',\n    red: '#e85d4f', green: '#7fd486', rose: '#e87da0', violet: '#9b8cf2', violetHi: '#cfc4ff'\n  };\n  MONO = \"'IBM Plex Mono', monospace\";\n  GROT = \"'Space Grotesk', sans-serif\";\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    this.alive = true;\n    this.mouse = { x: -1, y: -1, down: false, dragTab: null };\n    this.lastT = 0;\n    this.onKey = (e) => {\n      const order = ['pulse', 'clock', 'orbits', 'atlas', 'lexicon', 'shelf', 'weather', 'annie', 'signal'];\n      const i = '123456789'.indexOf(e.key);\n      if (i >= 0) this.setTab(order[i]);\n      if (e.key === ' ' && this.state.tab === 'atlas') { e.preventDefault(); this.setState(s => ({ atlasPlay: !s.atlasPlay })); }\n      if (e.key === ' ' && this.state.tab === 'annie') { e.preventDefault(); this.setState(s => ({ anniePlay: !s.anniePlay })); }\n    };\n    window.addEventListener('keydown', this.onKey);\n    this.loadData();\n  }\n\n  componentWillUnmount() {\n    this.alive = false;\n    window.removeEventListener('keydown', this.onKey);\n    if (this.ro) this.ro.disconnect();\n  }\n\n  async loadData() {\n    try {\n      // Route every dataset through the standalone bundler's resource map when present\n      // (window.__resources[id] is a blob: URL); fall back to the relative path otherwise.\n      const src = (id, path) => (window.__resources && window.__resources[id]) || path;\n      const grab = (id, path) => fetch(src(id, path)).then(r => r.json());\n      const [msg, plc, fav, rhetD, evs, annie, frags, ytd, yte, yti] = await Promise.all([\n        grab('messages', 'data/messages.json'),\n        grab('places', 'data/places.json'),\n        grab('favs', 'data/favs.json'),\n        grab('rhetoricalDaily', 'data/rhetorical_daily.json'),\n        grab('rhetoricalEvents', 'data/top_rhetorical_events.json'),\n        grab('annie', 'data/annie_rhetoric.json'),\n        grab('fragments', 'data/high_emotion_fragments.json'),\n        grab('youtubeDaily', 'data/youtube_daily.json'),\n        grab('youtubeEntities', 'data/youtube_top_entities.json'),\n        grab('youtubeInfluence', 'data/youtube_music_influence.json')\n      ]);\n      const rhet = { daily: rhetD.daily };\n      this.buildDerived(msg, plc, fav);\n      const dec = (s) => (s || '').replace(/&#39;/g, \"'\").replace(/&amp;/g, '&').replace(/&quot;/g, '\"').replace(/&#(\\d+);/g, (m, n) => String.fromCharCode(+n));\n      this.D.rhet = rhet.daily;\n      this.D.rhetEvents = evs.top;\n      this.D.annie = annie;\n      this.D.frags = frags.fragments;\n      this.D.yt = {\n        daily: ytd.daily.filter(d => d.day >= '2009-01-01'),\n        total: ytd.total_watches,\n        artists: yte.top_music_artists.map(a => ({ name: dec(a.name), count: a.count })),\n        infl: yti.top_influencers.map(a => ({ ...a, artist: dec(a.artist) }))\n      };\n      this.setState({ loading: false });\n      this.animateCounters();\n    } catch (e) {\n      console.error('LEVIATHAN data load failed', e);\n    }\n  }\n\n  // ---------- derived data ----------\n  d2i(dateStr) { return Math.round(Date.UTC(+dateStr.slice(0, 4), +dateStr.slice(5, 7) - 1, +dateStr.slice(8, 10)) / 86400000); }\n  i2d(idx) { const d = new Date(idx * 86400000); return d; }\n  fmtDate(idx, long) {\n    const d = this.i2d(idx);\n    const M = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];\n    if (long) return M[d.getUTCMonth()] + ' ' + String(d.getUTCDate()).padStart(2, '0') + ' ' + d.getUTCFullYear();\n    return M[d.getUTCMonth()] + ' ' + d.getUTCFullYear();\n  }\n\n  buildDerived(msg, plc, fav) {\n    const D = { msg, plc, fav };\n    // contiguous daily series\n    const first = this.d2i(msg.daily[0][0]);\n    const last = this.d2i(msg.daily[msg.daily.length - 1][0]);\n    const N = last - first + 1;\n    const S = new Float32Array(N), R = new Float32Array(N);\n    for (const [d, s, r] of msg.daily) { const i = this.d2i(d) - first; S[i] = s; R[i] = r; }\n    let maxDay = 1;\n    for (let i = 0; i < N; i++) maxDay = Math.max(maxDay, S[i], R[i]);\n    D.day0 = first; D.N = N; D.S = S; D.R = R; D.maxDay = maxDay;\n    D.eras = [\n      { a: '2011-03-18', b: '2013-05-01', label: 'NYC ONE', tone: 'amber' },\n      { a: '2013-05-01', b: '2019-02-01', label: 'UNIONTOWN', tone: 'slate' },\n      { a: '2019-02-01', b: '2025-02-01', label: 'NYC TWO', tone: 'amber' },\n      { a: '2025-02-01', b: '2026-06-09', label: 'RETURN', tone: 'slate' }\n    ].map(e => ({ ...e, i0: this.d2i(e.a) - first, i1: this.d2i(e.b) - first }));\n    D.events = [\n      ['2011-03-18', 'first recorded message'],\n      ['2015-11-26', 'annie thread opens'],\n      ['2019-02-15', 'move \\u2192 307 E 76th'],\n      ['2025-02-22', 'return \\u2192 337 saratoga'],\n      ['2025-09-09', 'loudest day on record \\u00b7 1,373 msgs'],\n      ['2026-06-01', 'closure']\n    ].map(([d, label]) => ({ i: this.d2i(d) - first, label }));\n    // module states\n    this.M = {\n      pulse: { a: 0, b: N, ta: 0, tb: N, vx: 0, reveal: 0, drag: null },\n      clock: { rot: 0, rotV: 0, needle: 0, flash: new Float32Array(24), drag: null },\n      orbits: null,\n      atlas: null,\n      lexicon: null,\n      shelf: null\n    };\n    this.D = D;\n  }\n\n  animateCounters() {\n    const t0 = performance.now(), dur = 1500;\n    const target = { m: 181650, t: 568, p: 548, k: 41971, w: 1121 };\n    const step = () => {\n      if (!this.alive) return;\n      const p = Math.min(1, (performance.now() - t0) / dur);\n      const e = 1 - Math.pow(1 - p, 3);\n      this.setState({ cnt: { m: Math.round(target.m * e), t: Math.round(target.t * e), p: Math.round(target.p * e), k: Math.round(target.k * e), w: Math.round(target.w * e) } });\n      if (p < 1) setTimeout(step, 40);\n    };\n    step();\n  }\n\n  // ---------- canvas plumbing ----------\n  canvasRef = (el) => {\n    if (!el || el === this.cv) return;\n    this.cv = el;\n    this.ctx = el.getContext('2d');\n    const pos = (e) => { const r = el.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };\n    el.addEventListener('pointerdown', (e) => { el.setPointerCapture(e.pointerId); const p = pos(e); this.mouse.x = p.x; this.mouse.y = p.y; this.mouse.down = true; this.dispatch('down', p, e); });\n    el.addEventListener('pointermove', (e) => { const p = pos(e); const dx = p.x - this.mouse.x, dy = p.y - this.mouse.y; this.mouse.x = p.x; this.mouse.y = p.y; this.dispatch('move', { ...p, dx, dy }, e); });\n    el.addEventListener('pointerup', (e) => { const p = pos(e); this.mouse.down = false; this.dispatch('up', p, e); });\n    el.addEventListener('pointerleave', () => { this.mouse.x = -1; this.mouse.y = -1; this.mouse.down = false; this.dispatch('leave', {}, null); });\n    el.addEventListener('wheel', (e) => { e.preventDefault(); this.dispatch('wheel', pos(e), e); }, { passive: false });\n    el.addEventListener('dblclick', (e) => this.dispatch('dbl', pos(e), e));\n    if (this.ro) this.ro.disconnect();\n    this.ro = new ResizeObserver(() => this.fit());\n    this.ro.observe(el.parentElement);\n    this.fit();\n    if (!this.rafOn) { this.rafOn = true; requestAnimationFrame(this.loop); }\n  };\n\n  fit() {\n    if (!this.cv) return;\n    const r = this.cv.parentElement.getBoundingClientRect();\n    const dpr = Math.min(2, window.devicePixelRatio || 1);\n    this.W = Math.max(50, r.width); this.H = Math.max(50, r.height);\n    this.cv.width = Math.round(this.W * dpr); this.cv.height = Math.round(this.H * dpr);\n    this.dpr = dpr;\n  }\n\n  loop = (t) => {\n    if (!this.alive) return;\n    requestAnimationFrame(this.loop);\n    const dt = Math.min(0.05, (t - this.lastT) / 1000 || 0.016);\n    this.lastT = t;\n    if (!this.ctx) return;\n    const ctx = this.ctx;\n    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);\n    ctx.fillStyle = this.COL.bg;\n    ctx.fillRect(0, 0, this.W, this.H);\n    if (!this.D || this.state.loading) return;\n    const fn = this['draw_' + this.state.tab];\n    if (fn) fn.call(this, ctx, this.W, this.H, dt);\n  };\n\n  dispatch(type, p, e) {\n    if (!this.D || this.state.loading) return;\n    const fn = this['pt_' + this.state.tab];\n    if (fn) fn.call(this, type, p, e);\n  }\n\n  setTab = (tab) => { if (tab !== this.state.tab) this.setState({ tab }); };\n\n  // ---------- shared draw helpers ----------\n  card(ctx, x, y, lines, opts) {\n    // lines: [[text, color, font]] ; auto-flips to stay on screen\n    const o = opts || {};\n    ctx.save();\n    let w = 0;\n    const lh = o.lh || 16;\n    for (const [txt, , font] of lines) { ctx.font = font || ('10px ' + this.MONO); w = Math.max(w, ctx.measureText(txt).width); }\n    w += 24; const h = lines.length * lh + 16;\n    let bx = x + 14, by = y - h - 10;\n    if (bx + w > this.W - 8) bx = x - w - 14;\n    if (by < 8) by = y + 16;\n    if (bx < 8) bx = 8;\n    ctx.fillStyle = 'rgba(13,17,24,0.94)';\n    ctx.strokeStyle = o.border || this.COL.line;\n    ctx.beginPath(); ctx.rect(bx, by, w, h); ctx.fill(); ctx.stroke();\n    lines.forEach(([txt, color, font], i) => {\n      ctx.font = font || ('10px ' + this.MONO);\n      ctx.fillStyle = color || this.COL.txt;\n      ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';\n      ctx.fillText(txt, bx + 12, by + 12 + (i + 0.55) * lh - 4);\n    });\n    ctx.restore();\n    return { bx, by, w, h };\n  }\n\n  fmt(n) { return Math.round(n).toLocaleString('en-US'); }\n\n  maskId(id) {\n    if (/^\\+\\d{11}$/.test(id)) return '+' + id.slice(1, 2) + ' ' + id.slice(2, 5) + ' \\u00b7\\u00b7\\u00b7 ' + id.slice(7);\n    if (id.includes('@')) return id.slice(0, 4) + '\\u00b7\\u00b7\\u00b7@';\n    if (id.startsWith('chat')) return 'GROUP \\u00b7' + id.slice(-4);\n    return id.slice(0, 12);\n  }\n\n  // ============================================================\n  // MODULE 01 — PULSE\n  // ============================================================\n  draw_pulse(ctx, W, H, dt) {\n    const D = this.D, C = this.COL, P = this.M.pulse;\n    P.reveal = Math.min(1, P.reveal + dt * 0.8);\n    // inertia + smoothing\n    if (!this.mouse.down && Math.abs(P.vx) > 0.001) {\n      const span = P.tb - P.ta;\n      P.ta -= P.vx * span; P.tb -= P.vx * span; P.vx *= 0.93;\n      this.pulseClamp();\n    }\n    P.a += (P.ta - P.a) * Math.min(1, dt * 11);\n    P.b += (P.tb - P.b) * Math.min(1, dt * 11);\n\n    const eraY = 8, eraH = 20;\n    const wTop = 42, wBot = H - 104;\n    const mid = (wTop + wBot) / 2, half = (wBot - wTop) / 2 - 4;\n    const mmY = H - 64, mmH = 34;\n    const span = Math.max(1, P.b - P.a);\n    const xOf = (i) => ((i - P.a) / span) * W;\n    const iOf = (x) => P.a + (x / W) * span;\n\n    // era bands\n    for (const e of D.eras) {\n      const x0 = Math.max(0, xOf(e.i0)), x1 = Math.min(W, xOf(e.i1));\n      if (x1 < 0 || x0 > W || x1 - x0 < 2) continue;\n      ctx.fillStyle = e.tone === 'amber' ? 'rgba(232,163,61,0.07)' : 'rgba(79,195,232,0.05)';\n      ctx.fillRect(x0, eraY, x1 - x0, eraH);\n      ctx.fillStyle = e.tone === 'amber' ? 'rgba(232,163,61,0.06)' : 'rgba(79,195,232,0.04)';\n      ctx.fillRect(x0, wTop, x1 - x0, wBot - wTop);\n      if (x1 - x0 > 70) {\n        ctx.font = '9px ' + this.MONO;\n        ctx.fillStyle = e.tone === 'amber' ? C.amber : C.cyan;\n        ctx.textAlign = 'left'; ctx.textBaseline = 'middle';\n        ctx.fillText(e.label, x0 + 8, eraY + eraH / 2 + 0.5);\n      }\n    }\n\n    // year grid\n    ctx.textAlign = 'center'; ctx.textBaseline = 'top';\n    const y0 = this.i2d(D.day0 + Math.floor(P.a)).getUTCFullYear();\n    const y1 = this.i2d(D.day0 + Math.ceil(P.b)).getUTCFullYear();\n    for (let y = y0; y <= y1 + 1; y++) {\n      const i = this.d2i(y + '-01-01') - D.day0;\n      const x = xOf(i);\n      if (x < -40 || x > W + 40) continue;\n      ctx.strokeStyle = C.grid; ctx.lineWidth = 1;\n      ctx.beginPath(); ctx.moveTo(x, wTop); ctx.lineTo(x, wBot + 16); ctx.stroke();\n      ctx.font = '10px ' + this.MONO; ctx.fillStyle = C.dim;\n      ctx.fillText(String(y), x, wBot + 20);\n    }\n    // month ticks when zoomed\n    if (span < 1200) {\n      for (let y = y0; y <= y1; y++) for (let m = 1; m < 12; m++) {\n        const i = this.d2i(y + '-' + String(m + 1).padStart(2, '0') + '-01') - D.day0;\n        const x = xOf(i);\n        if (x < 0 || x > W) continue;\n        ctx.strokeStyle = 'rgba(20,26,35,0.7)';\n        ctx.beginPath(); ctx.moveTo(x, mid - half * 0.5); ctx.lineTo(x, mid + half * 0.5); ctx.stroke();\n        if (span < 420) {\n          ctx.font = '8px ' + this.MONO; ctx.fillStyle = C.faint;\n          ctx.fillText('JFMAMJJASOND'[m], x, wBot + 6);\n        }\n      }\n    }\n\n    // midline\n    ctx.strokeStyle = '#222a37'; ctx.lineWidth = 1;\n    ctx.beginPath(); ctx.moveTo(0, mid); ctx.lineTo(W, mid); ctx.stroke();\n\n    // waveform columns\n    const amp = (v) => Math.min(1, Math.sqrt(v / D.maxDay) * 1.12) * half;\n    const revealX = P.reveal * W * 1.15;\n    for (let x = 0; x < W; x++) {\n      if (x > revealX) break;\n      const i0 = Math.max(0, Math.floor(iOf(x))), i1 = Math.min(D.N - 1, Math.max(i0, Math.floor(iOf(x + 1))));\n      if (i0 >= D.N || i1 < 0) continue;\n      let s = 0, r = 0;\n      for (let i = i0; i <= i1; i++) { if (D.S[i] > s) s = D.S[i]; if (D.R[i] > r) r = D.R[i]; }\n      const fade = Math.min(1, (revealX - x) / 60);\n      if (s > 0) {\n        const h = amp(s);\n        const g = ctx.createLinearGradient(0, mid - h, 0, mid);\n        g.addColorStop(0, 'rgba(232,163,61,' + (0.95 * fade) + ')');\n        g.addColorStop(1, 'rgba(232,163,61,' + (0.18 * fade) + ')');\n        ctx.fillStyle = g;\n        ctx.fillRect(x, mid - h, 1, h);\n      }\n      if (r > 0) {\n        const h = amp(r);\n        const g = ctx.createLinearGradient(0, mid, 0, mid + h);\n        g.addColorStop(0, 'rgba(79,195,232,' + (0.16 * fade) + ')');\n        g.addColorStop(1, 'rgba(79,195,232,' + (0.85 * fade) + ')');\n        ctx.fillStyle = g;\n        ctx.fillRect(x, mid, 1, h);\n      }\n    }\n    // axis legend\n    ctx.font = '9px ' + this.MONO; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';\n    ctx.fillStyle = C.amber; ctx.fillText('\\u25b2 SENT', 10, wTop + 8);\n    ctx.fillStyle = C.cyan; ctx.fillText('\\u25bc RECEIVED', 10, wBot - 8);\n\n    // event pins\n    let hoverEvent = null;\n    for (const ev of D.events) {\n      const x = xOf(ev.i);\n      if (x < -10 || x > W + 10) continue;\n      const near = Math.abs(this.mouse.x - x) < 7 && this.mouse.y > wTop && this.mouse.y < wBot;\n      if (near) hoverEvent = { ...ev, x };\n      ctx.save();\n      ctx.translate(x, mid);\n      ctx.rotate(Math.PI / 4);\n      ctx.fillStyle = near ? C.amberHi : C.amber;\n      const s = near ? 5.5 : 4;\n      ctx.fillRect(-s / 2, -s / 2, s, s);\n      ctx.restore();\n    }\n\n    // minimap\n    this.pulseMini(ctx, W, mmY, mmH);\n\n    // hover crosshair + card\n    const mx = this.mouse.x, my = this.mouse.y;\n    if (mx >= 0 && my > wTop && my < wBot && !P.drag) {\n      const di = Math.floor(iOf(mx));\n      if (di >= 0 && di < D.N) {\n        ctx.strokeStyle = 'rgba(232,230,225,0.25)';\n        ctx.setLineDash([3, 4]);\n        ctx.beginPath(); ctx.moveTo(mx, wTop); ctx.lineTo(mx, wBot); ctx.stroke();\n        ctx.setLineDash([]);\n        const perPx = span / W;\n        let lines;\n        if (perPx <= 1.6) {\n          const s = D.S[di], r = D.R[di];\n          lines = [\n            [this.fmtDate(D.day0 + di, true), C.txt, '600 11px ' + this.MONO],\n            [this.fmt(s) + ' sent', C.amber],\n            [this.fmt(r) + ' received', C.cyan]\n          ];\n        } else {\n          const w = Math.ceil(perPx * 3);\n          let s = 0, r = 0;\n          for (let i = Math.max(0, di - w); i <= Math.min(D.N - 1, di + w); i++) { s += D.S[i]; r += D.R[i]; }\n          lines = [\n            ['\\u2248 ' + this.fmtDate(D.day0 + di), C.txt, '600 11px ' + this.MONO],\n            [this.fmt(s) + ' sent / ' + this.fmt(r) + ' recv', C.dim],\n            ['in surrounding ' + (2 * w + 1) + ' days', C.faint]\n          ];\n        }\n        if (hoverEvent) lines.push(['\\u25c6 ' + hoverEvent.label, C.amberHi]);\n        this.card(ctx, mx, Math.min(my, mid), lines);\n      }\n    }\n  }\n\n  pulseMini(ctx, W, y, h) {\n    const D = this.D, C = this.COL, P = this.M.pulse;\n    if (!this._miniCache || this._miniCache.w !== W) {\n      const cols = new Float32Array(W * 2);\n      for (let x = 0; x < W; x++) {\n        const i0 = Math.floor((x / W) * D.N), i1 = Math.max(i0, Math.floor(((x + 1) / W) * D.N) - 1);\n        let s = 0, r = 0;\n        for (let i = i0; i <= i1 && i < D.N; i++) { if (D.S[i] > s) s = D.S[i]; if (D.R[i] > r) r = D.R[i]; }\n        cols[x * 2] = s; cols[x * 2 + 1] = r;\n      }\n      this._miniCache = { w: W, cols };\n    }\n    const { cols } = this._miniCache;\n    ctx.fillStyle = '#0b0f15';\n    ctx.fillRect(0, y, W, h);\n    const midm = y + h / 2;\n    for (let x = 0; x < W; x += 1) {\n      const s = cols[x * 2], r = cols[x * 2 + 1];\n      const hs = Math.sqrt(s / D.maxDay) * (h / 2 - 2), hr = Math.sqrt(r / D.maxDay) * (h / 2 - 2);\n      if (s) { ctx.fillStyle = 'rgba(232,163,61,0.45)'; ctx.fillRect(x, midm - hs, 1, hs); }\n      if (r) { ctx.fillStyle = 'rgba(79,195,232,0.4)'; ctx.fillRect(x, midm, 1, hr); }\n    }\n    // view window\n    const x0 = (P.a / D.N) * W, x1 = (P.b / D.N) * W;\n    ctx.fillStyle = 'rgba(232,230,225,0.07)';\n    ctx.fillRect(x0, y, x1 - x0, h);\n    ctx.strokeStyle = 'rgba(232,230,225,0.4)'; ctx.lineWidth = 1;\n    ctx.strokeRect(x0 + 0.5, y + 0.5, Math.max(3, x1 - x0) - 1, h - 1);\n  }\n\n  pulseClamp() {\n    const P = this.M.pulse, N = this.D.N;\n    const span = Math.max(10, Math.min(N, P.tb - P.ta));\n    if (P.ta < -span * 0.15) P.ta = -span * 0.15;\n    if (P.tb > N + span * 0.15) P.tb = N + span * 0.15;\n    P.tb = P.ta + span;\n    if (P.tb > N + span * 0.15) { P.tb = N + span * 0.15; P.ta = P.tb - span; }\n  }\n\n  pt_pulse(type, p, e) {\n    const P = this.M.pulse, W = this.W, H = this.H;\n    const mmY = H - 64, mmH = 34;\n    const span = P.tb - P.ta;\n    if (type === 'down') {\n      if (p.y > mmY - 4 && p.y < mmY + mmH + 4) {\n        P.drag = 'mini';\n        const center = (p.x / W) * this.D.N;\n        P.ta = center - span / 2; P.tb = center + span / 2;\n        this.pulseClamp();\n      } else { P.drag = 'pan'; P.vx = 0; }\n    } else if (type === 'move') {\n      if (!this.mouse.down) return;\n      if (P.drag === 'pan') {\n        const d = (p.dx / W) * span;\n        P.ta -= d; P.tb -= d;\n        P.vx = p.dx / W;\n        this.pulseClamp();\n        P.a = P.ta; P.b = P.tb;\n      } else if (P.drag === 'mini') {\n        const center = (p.x / W) * this.D.N;\n        P.ta = center - span / 2; P.tb = center + span / 2;\n        this.pulseClamp();\n      }\n    } else if (type === 'up' || type === 'leave') {\n      P.drag = null;\n    } else if (type === 'wheel') {\n      const f = Math.exp(e.deltaY * 0.0016);\n      const pivot = P.ta + (p.x / W) * span;\n      P.ta = pivot - (pivot - P.ta) * f;\n      P.tb = p ', '#e85d4f'],\n    ['sorry', 'APOLOGY', '#7fd486'],\n    ['qual', 'HEDGING', '#4fc3e8'],\n    ['imp', 'COMMAND', '#e8a33d'],\n    ['caps', 'SHOUT', '#e8e6e1']\n  ];\n  initWeather() {\n    const D = this.D, rd = D.rhet;\n    const day0 = this.d2i(rd[0].date);\n    const dayN = this.d2i(rd[rd.length - 1].date);\n    const nW = Math.floor((dayN - day0) / 7) + 1;\n    const keys = this.WLAYERS.map(l => l[0]);\n    const sums = {}, msgs = new Float32Array(nW);\n    for (const k of keys) sums[k] = new Float32Array(nW);\n    for (const d of rd) {\n      const w = Math.floor((this.d2i(d.date) - day0) / 7);\n      msgs[w] += d.total;\n      for (const k of keys) sums[k][w] += d[k] || 0;\n    }\n    // 3-week smoothing into raw + rate matrices\n    const smooth = (arr) => {\n      const out = new Float32Array(nW);\n      for (let i = 0; i < nW; i++) {\n        let s = 0, n = 0;\n        for (let j = Math.max(0, i - 1); j <= Math.min(nW - 1, i + 1); j++) { s += arr[j]; n++; }\n        out[i] = s / n;\n      }\n      return out;\n    };\n    const raw = {}, rate = {};\n    const msgsS = smooth(msgs);\n    for (const k of keys) {\n      raw[k] = smooth(sums[k]);\n      rate[k] = new Float32Array(nW);\n      for (let i = 0; i < nW; i++) rate[k][i] = msgsS[i] > 3 ? raw[k][i] / msgsS[i] * 100 : 0;\n    }\n    const events = D.rhetEvents.map(ev => ({ ...ev, w: (this.d2i(ev.date) - day0) / 7 })).sort((a, b) => b.intensity_score - a.intensity_score);\n    this.M.weather = { day0, nW, raw, rate, msgs, events, a: 0, b: nW, ta: 0, tb: nW, hoverEv: null };\n  }\n  draw_weather(ctx, W, H, dt) {\n    if (!this.M.weather) this.initWeather();\n    const C = this.COL, Wt = this.M.weather, st = this.state;\n    Wt.a += (Wt.ta - Wt.a) * Math.min(1, dt * 10);\n    Wt.b += (Wt.tb - Wt.b) * Math.min(1, dt * 10);\n    const span = Math.max(2, Wt.b - Wt.a);\n    const padT = 60, padB = 60;\n    const mid = (H - padB + padT) / 2, halfH = (H - padB - padT) / 2 - 10;\n    const xOf = (w) => ((w - Wt.a) / span) * W;\n    const data = st.weatherMode === 'rate' ? Wt.rate : Wt.raw;\n    const on = this.WLAYERS.filter(l => st.weatherLayers[l[0]]);\n    // max stack\n    let mx = 0.001;\n    for (let i = Math.max(0, Math.floor(Wt.a)); i < Math.min(Wt.nW, Math.ceil(Wt.b)); i++) {\n      let s = 0; for (const [k] of on) s += data[k][i];\n      mx = Math.max(mx, s);\n    }\n    const SC = (halfH * 2) / mx;\n    // year grid\n    ctx.font = '10px ' + this.MONO; ctx.textAlign = 'center'; ctx.textBaseline = 'top';\n    for (let y = 2011; y <= 2027; y++) {\n      const w = (this.d2i(y + '-01-01') - Wt.day0) / 7;\n      const x = xOf(w);\n      if (x < -30 || x > W + 30) continue;\n      ctx.strokeStyle = C.grid; ctx.beginPath(); ctx.moveTo(x, padT - 14); ctx.lineTo(x, H - padB + 10); ctx.stroke();\n      ctx.fillStyle = C.dim; ctx.fillText(String(y), x, H - padB + 16);\n    }\n    // streamgraph: centered stack\n    const i0 = Math.max(0, Math.floor(Wt.a) - 1), i1 = Math.min(Wt.nW - 1, Math.ceil(Wt.b) + 1);\n    const totalAt = (i) => { let s = 0; for (const [k] of on) s += data[k][i]; return s; };\n    let baseline = new Float32Array(i1 - i0 + 1);\n    for (let i = i0; i <= i1; i++) baseline[i - i0] = mid - totalAt(i) * SC / 2;\n    for (const [k, label, col] of on) {\n      ctx.beginPath();\n      for (let i = i0; i <= i1; i++) {\n        const x = xOf(i), y = baseline[i - i0];\n        i === i0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);\n      }\n      for (let i = i1; i >= i0; i--) {\n        const y = baseline[i - i0] + data[k][i] * SC;\n        ctx.lineTo(xOf(i), y);\n      }\n      ctx.closePath();\n      ctx.fillStyle = col + 'cc';\n      ctx.fill();\n      for (let i = i0; i <= i1; i++) baseline[i - i0] += data[k][i] * SC;\n    }\n    // lightning strikes\n    Wt.hoverEv = null;\n    const evShow = Wt.events.slice(0, 50);\n    for (const ev of evShow) {\n      const x = xOf(ev.w);\n      if (x < -10 || x > W + 10) continue;\n      const inten = Math.min(1, ev.intensity_ / MODULE 08 — ANNIE  (the 62,788-message polygraph)\n  // ============================================================\n  APENS = [\n    ['love', 'LOVE', '#e87da0'],\n    ['prof', 'PROFANITY', '#e85d4f'],\n    ['sorry', 'APOLOGY', '#7fd486'],\n    ['caps', 'SHOUT', '#e8e6e1']\n  ];\n  initAnnie() {\n    const A = this.D.annie;\n    const mIdx = (m) => +m.slice(0, 4) * 12 + (+m.slice(5, 7) - 1);\n    const m0 = mIdx(A.monthly[0].month), m1 = mIdx(A.monthly[A.monthly.length - 1].month);\n    const nM = m1 - m0 + 1;\n    const months = Array.from({ length: nM }, (_, i) => {\n      const y = Math.floor((m0 + i) / 12), mo = (m0 + i) % 12;\n      return { month: y + '-' + String(mo + 1).padStart(2, '0'), total: 0, love: 0, prof: 0, sorry: 0, caps: 0 };\n    });\n    for (const m of A.monthly) {\n      const t = months[mIdx(m.month) - m0];\n      Object.assign(t, { total: m.total, love: m.love, prof: m.prof, sorry: m.sorry, caps: m.caps });\n    }\n    let maxTot = 1;\n    const rates = {};\n    for (const [k] of this.APENS) rates[k] = new Float32Array(nM);\n    for (let i = 0; i < nM; i++) {\n      maxTot = Math.max(maxTot, months[i].total);\n      for (const [k] of this.APENS) rates[k][i] = months[i].total > 20 ? months[i][k] / months[i].total * 100 : 0;\n    }\n    const maxRate = {};\n    for (const [k] of this.APENS) { let m = 0.001; for (let i = 0; i < nM; i++) m = Math.max(m, rates[k][i]); maxRate[k] = m; }\n    // fragments → month float position\n    const frags = this.D.frags.map(f => ({\n      ...f,\n      pos: (mIdx(f.day.slice(0, 7)) - m0) + (+f.day.slice(8, 10) - 1) / 30.5,\n      shownAt: 0\n    })).sort((a, b) => a.pos - b.pos);\n    this.M.annie = { months, nM, m0, rates, maxRate, maxTot, frags, play: 0.001, scrub: false };\n  }\n  annieRestart = () => { if (this.M.annie) { this.M.annie.play = 0.001; for (const f of this.M.annie.frags) f.shownAt = 0; this.setState({ anniePlay: true }); } };\n  draw_annie(ctx, W, H, dt) {\n    if (!this.M.annie) this.initAnnie();\n    const C = this.COL, An = this.M.annie, st = this.state;\n    if (st.anniePlay && !An.scrub) {\n      An.play += st.annieSpeed * dt;\n      if (An.play >= An.nM - 0.01) { An.play = An.nM - 0.01; this.setState({ anniePlay: false }); }\n    }\n    const chartR = W * 0.62;\n    const padL = 110, padT = 64, padB = 70;\n    const laneGap = 10;\n    const nLanes = this.APENS.length + 1;\n    const laneH = (H - padT - padB - laneGap * (nLanes - 1)) / nLanes;\n    const xOf = (m) => padL + (m / (An.nM - 1)) * (chartR - padL - 20);\n    const playX = xOf(An.play);\n    // header numbers\n    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';\n    ctx.font = '700 17px ' + this.GROT; ctx.fillStyle = C.amberHi;\n    ctx.fillText('ANNIE', 18, 32);\n    ctx.font = '9px ' + this.MONO; ctx.fillStyle = C.dim;\n    ctx.fillText('62,788 MESSAGES \\u00b7 1,333 DAYS \\u00b7 NOV 2015 \\u2192 JUL 2019 \\u00b7 \\u201cLOVE YOU\\u201d \\u00d7 1,634', 18, 48);\n    // playhead date readout\n    const mi = Math.min(An.nM - 1, Math.floor(An.play));\n    const curMonth = An.months[mi];\n    ctx.font = '600 13px ' + this.MONO; ctx.fillStyle = C.txt; ctx.textAlign = 'right';\n    const M = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];\n    const my2 = curMonth.month;\n    ctx.fillText(M[+my2.slice(5, 7) - 1] + ' ' + my2.slice(0, 4) + ' \\u00b7 ' + this.fmt(curMonth.total) + ' MSGS', chartR - 20, 32);\n    ctx.textAlign = 'left';\n\n    // pen lanes\n    this.APENS.forEach(([k, label, col], li) => {\n      const y0 = padT + li * (laneH + laneGap);\n      ctx.fillStyle = 'rgba(13,17,24,0.6)';\n      ctx.fillRect(padL, y0, chartR - padL - 20, laneH);\n      ctx.strokeStyle = C.grid; ctx.strokeRect(padL + 0.5, y0 + 0.5, chartR - padL - 20, laneH);\n      // label\n      ctx.font = '9px ' + this.MONO; ctx.fillStyle = col; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';\n      ctx.fillText(label, padL - 12, y0 + laneH / 2);\n      ctx.fillStyle = C.faint; ctx.font = '7.5px ' + this.MONO;\n      ctx.fillText('/100 MSG', padL - 12, y0 + laneH / 2 + 12);\n      ctx.textAlign = 'left';\n      // trace up to playhead\n      const rate = An.rates[k], mxr = An.maxRate[k];\n      ctx.strokeStyle = col; ctx.lineWidth = 1.5;\n      ctx.beginPath();\n      const upTo = An.play;\n      for (let m = 0; m <= upTo && m < An.nM; m += 0.25) {\n        const i = Math.min(An.nM - 1, m);\n        const i0 = Math.floor(i), f = i - i0;\n        const v = rate[i0] * (1 - f) + rate[Math.min(An.nM - 1, i0 + 1)] * f;\n        const x = xOf(m), y = y0 + laneH - 5 - (v / mxr) * (laneH - 12);\n        m === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);\n      }\n      ctx.stroke();\n      // pen head with jitter\n      const i0 = Math.floor(Math.min(An.nM - 1, An.play)), f = An.play - i0;\n      const v = rate[i0] * (1 - f) + rate[Math.min(An.nM - 1, i0 + 1)] * f;\n      const jit = st.anniePlay ? (Math.random() - 0.5) * v * 1.2 : 0;\n      const hy = y0 + laneH - 5 - (v / mxr) * (laneH - 12) + jit;\n      ctx.fillStyle = col;\n      ctx.beginPath(); ctx.arc(playX, hy, 3.4, 0, Math.PI * 2); ctx.fill();\n      ctx.strokeStyle = col + '55';\n      ctx.beginPath(); ctx.moveTo(playX, hy); ctx.lineTo(playX + 14, hy - 10); ctx.stroke();\n      // current value\n      ctx.font = '8px ' + this.MONO; ctx.fillStyle = col;\n      ctx.fillText(v.toFixed(1), playX + 17, hy - 12);\n    });\n    // volume lane\n    const vy0 = padT + this.APENS.length * (laneH + laneGap);\n    ctx.fillStyle = 'rgba(13,17,24,0.6)';\n    ctx.fillRect(padL, vy0, chartR - padL - 20, laneH);\n    ctx.font = '9px ' + this.MONO; ctx.fillStyle = C.amber; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';\n    ctx.fillText('VOLUME', padL - 12, vy0 + laneH / 2);\n    ctx.textAlign = 'left';\n    for (let i = 0; i < An.nM; i++) {\n      const x = xOf(i), bw = Math.max(2, (chartR - padL - 20) / An.nM - 2);\n      const hh = Math.sqrt(An.months[i].total / An.maxTot) * (laneH - 8);\n      const past = i <= An.play;\n      ctx.fillStyle = past ? 'rgba(232,163,61,0.8)' : 'rgba(232,163,61,0.16)';\n      ctx.fillRect(x - bw / 2, vy0 + laneH - 4 - hh, bw, hh);\n    }\n    // playhead line\n    ctx.strokeStyle = 'rgba(232,230,225,0.5)'; ctx.lineWidth = 1;\n    ctx.beginPath(); ctx.moveTo(playX, padT - 6); ctx.lineTo(playX, vy0 + laneH + 8); ctx.stroke();\n    // year ticks\n    ctx.font = '9px ' + this.MONO; ctx.fillStyle = C.dim; ctx.textAlign = 'center'; ctx.textBaseline = 'top';\n    for (let i = 0; i < An.nM; i++) {\n      if (An.months[i].month.slice(5) === '01') ctx.fillText(An.months[i].month.slice(0, 4), xOf(i), vy0 + laneH + 12);\n    }\n    An.scrubGeo = { x0: padL, x1: chartR - 20, y1: vy0 + laneH };\n\n    // ---- fragment feed panel ----\n    const fx = chartR + 8, fw = W - fx - 16;\n    ctx.fillStyle = 'rgba(11,15,21,0.85)';\n    ctx.fillRect(fx, padT - 22, fw, H - padT - 36);\n    ctx.strokeStyle = C.line; ctx.strokeRect(fx + 0.5, padT - 21.5, fw, H - padT - 36);\n    ctx.font = '9px ' + this.MONO; ctx.fillStyle = C.faint; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';\n    ctx.fillText('HIGH-EMOTION FRAGMENTS \\u00b7 VERBATIM \\u00b7 SENT BY HIM', fx + 14, padT - 6);\n    const now = performance.now();\n    const visible = [];\n    for (const f of An.frags) {\n      if (f.pos <= An.play) { if (!f.shownAt) f.shownAt = now; visible.push(f); }\n      else f.shownAt = 0;\n    }\n    const feed = visible.slice(-5).reverse();\n    let fy = padT + 22;\n    ctx.textBaseline = 'alphabetic';\n    for (let i = 0; i < feed.length; i++) {\n      const f = feed[i];\n      const age = (now - f.shownAt) / 1000;\n      const chars = Math.floor(age * 60);\n      const txt = f.text.slice(0, chars);\n      const alpha = i === 0 ? 1 : Math.max(0.25, 0.8 - i * 0.18);\n      ctx.font = '9px ' + this.MONO; ctx.fillStyle = 'rgba(232,163,61,' + alpha * 0.9 + ')';\n      ctx.fillText(f.day, fx + 14, fy);\n      fy += 14;\n      ctx.font = (i === 0 ? '500 12.5px ' : '11px ') + this.GROT;\n      ctx.fillStyle = 'rgba(232,230,225,' + alpha + ')';\n      // word wrap\n      const words = txt.split(' ');\n      let line = '', lh = i === 0 ? 17 : 15;\n      for (const w2 of words) {\n        if (ctx.measureText(line + w2).width > fw - 28) { ctx.fillText(line, fx + 14, fy); fy += lh; line = w2 + ' '; }\n        else line += w2 + ' ';\n        if (fy > H - 70) break;\n      }\n      if (fy <= H - 70) { ctx.fillText(line + (i === 0 && chars < f.text.length ? '\\u258c' : ''), fx + 14, fy); fy += lh + 12; }\n      if (fy > H - 70) break;\n    }\n    if (!visible.length) {\n      ctx.font = '10px ' + this.MONO; ctx.fillStyle = C.faint;\n      ctx.fillText('PRESS \\u25b6 \\u2014 THE PENS WILL WRITE', fx + 14, padT + 30);\n    }\n    ctx.font = '8px ' + this.MONO; ctx.fillStyle = C.faint;\n    ctx.fillText(visible.length + ' / ' + An.frags.length + ' FRAGMENTS SURFACED', fx + 14, H - 54);\n  }\n  pt_annie(type, p) {\n    const An = this.M.annie; if (!An) return;\n    const g = An.scrubGeo; if (!g) return;\n    if (type === 'down' && p.x < g.x1 + 20 && p.x > g.x0 - 20) {\n      An.scrub = true;\n      An.play = Math.max(0.001, Math.min(An.nM - 0.01, ((p.x - g.x0) / (g.x1 - g.x0)) * (An.nM - 1)));\n    } else if (type === 'move' && An.scrub && this.mouse.down) {\n      An.play = Math.max(0.001, Math.min(An.nM - 0.01, ((p.x - g.x0) / (g.x1 - g.x0)) * (An.nM - 1)));\n    } else if (type === 'up' || type === 'leave') {\n      An.scrub = false;\n    }\n  }\n\n  // ============================================================\n  // MODULE 09 — SIGNAL  (YouTube spectrogram + artist tuner)\n  // ============================================================\n  initSignal() {\n    const D = this.D, yt = D.yt;\n    const mIdx = (m) => +m.slice(0, 4) * 12 + (+m.slice(5, 7) - 1);\n    const m0 = mIdx('2010-01'), m1 = mIdx('2025-07');\n    const nM = m1 - m0 + 1;\n    const watch = new Float32Array(nM), music = new Float32Array(nM);\n    const titles = new Array(nM).fill(null);\n    for (const d of yt.daily) {\n      const i = mIdx(d.day.slice(0, 7)) - m0;\n      if (i < 0 || i >= nM) continue;\n      watch[i] += d.total_watches; music[i] += d.music_watches;\n      if (!titles[i] && d.sample_titles && d.sample_titles[0]) {\n        titles[i] = d.sample_titles[0].replace(/&#39;/g, \"'\").replace(/&amp;/g, '&').replace(/&quot;/g, '\"').slice(0, 44);\n      }\n    }\n    // msgs per month from D.msg.monthly\n    const msgs = new Float32Array(nM);\n    for (const [m, s, r] of D.msg.monthly) {\n      const i = mIdx(m) - m0;\n      if (i >= 0 && i < nM) msgs[i] = s + r;\n    }\n    let maxW = 1, maxM = 1;\n    for (let i = 0; i < nM; i++) { maxW = Math.max(maxW, watch[i]); maxM = Math.max(maxM, msgs[i]); }\n    // stations sorted by count desc already; give each a matched influencer if any\n    const stations = D.yt.artists.map(a => {\n      const low = a.name.toLowerCase();\n      const inf = D.yt.infl.find(x => low.includes(x.artist.toLowerCase()) || x.artist.toLowerCase().includes(low));\n      return { ...a, inf };\n    });\n    this.M.signal = { m0, nM, watch, music, msgs, titles, maxW, maxM, stations, pos: 0, vel: 0, dragDial: false, snapT: 0 };\n  }\n  draw_signal(ctx, W, H, dt) {\n    if (!this.M.signal) this.initSignal();\n    const C = this.COL, S = this.M.signal, st = this.state;\n    dt = Math.min(dt, 0.04);\n    const dialH = 168;\n    const specB = H - dialH - 14;\n    const padT = 56;\n    const midY = padT + (specB - padT) * 0.56;\n    const xOf = (i) => 14 + (i / (S.nM - 1)) * (W - 28);\n    const bw = Math.max(2, (W - 28) / S.nM - 1.5);\n    // year grid\n    ctx.font = '9px ' + this.MONO; ctx.textAlign = 'center'; ctx.textBaseline = 'top';\n    for (let y = 2010; y <= 2025; y++) {\n      const i = (y * 12) - S.m0;\n      const x = xOf(i);\n      ctx.strokeStyle = C.grid; ctx.beginPath(); ctx.moveTo(x, padT - 8); ctx.lineTo(x, specB); ctx.stroke();\n      if (y % 2 === 0) { ctx.fillStyle = C.faint; ctx.fillText(\"'\" + String(y).slice(2), x, specB + 4); }\n    }\n    // midline\n    ctx.strokeStyle = '#222a37'; ctx.beginPath(); ctx.moveTo(14, midY); ctx.lineTo(W - 14, midY); ctx.stroke();\n    // hover month\n    let hoverI = -1;\n    if (this.mouse.x >= 14 && this.mouse.x <= W - 14 && this.mouse.y > padT - 10 && this.mouse.y < specB) {\n      hoverI = Math.round(((this.mouse.x - 14) / (W - 28)) * (S.nM - 1));\n    }\n    // spectrogram bars\n    for (let i = 0; i < S.nM; i++) {\n      const x = xOf(i);\n      const wv = S.watch[i], mv = S.music[i], gv = S.msgs[i];\n      const isH = i === hoverI;\n      if (wv > 0 && (!st.signalMusic || mv > 0)) {\n        const hh = Math.sqrt((st.signalMusic ? mv : wv) / S.maxW) * (midY - padT);\n        ctx.fillStyle = isH ? C.violetHi : 'rgba(155,140,242,0.55)';\n        ctx.fillRect(x - bw / 2, midY - hh, bw, hh);\n        if (!st.signalMusic && mv > 0) {\n          const mh = Math.sqrt(mv / S.maxW) * (midY - padT);\n          ctx.fillStyle = isH ? '#ffffff' : 'rgba(207,196,255,0.95)';\n          ctx.fillRect(x - bw / 2, midY - mh, bw, mh);\n        }\n      }\n      if (gv > 0) {\n        const gh = Math.sqrt(gv / S.maxM) * (specB - midY - 8);\n        ctx.fillStyle = isH ? 'rgba(232,163,61,0.9)' : 'rgba(232,163,61,0.28)';\n        ctx.fillRect(x - bw / 2, midY, bw, gh);\n      }\n    }\n    // labels\n    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';\n    ctx.font = '700 15px ' + this.GROT; ctx.fillStyle = C.violetHi;\n    ctx.fillText('SIGNAL', 18, 30);\n    ctx.font = '9px ' + this.MONO; ctx.fillStyle = C.dim;\n    ctx.fillText('12,863 YOUTUBE WATCHES \\u25b2  vs  MESSAGE VOLUME \\u25bc \\u00b7 2010 \\u2192 2025 \\u00b7 BRIGHT CORE = MUSIC', 18, 46);\n    if (hoverI >= 0) {\n      const y = Math.floor((S.m0 + hoverI) / 12), mo = (S.m0 + hoverI) % 12;\n      const M = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];\n      const lines = [\n        [M[mo] + ' ' + y, C.txt, '600 11px ' + this.MONO],\n        [this.fmt(S.watch[hoverI]) + ' WATCHES \\u00b7 ' + this.fmt(S.music[hoverI]) + ' MUSIC', C.violet],\n        [this.fmt(S.msgs[hoverI]) + ' MESSAGES', C.amber]\n      ];\n      if (S.titles[hoverI]) lines.push(['\\u201c' + S.titles[hoverI] + '\\u2026\\u201d', C.dim, '9px ' + this.MONO]);\n      this.card(ctx, this.mouse.x, this.mouse.y, lines);\n    }\n\n    // ---- TUNER ----\n    const dy = H - dialH;\n    ctx.fillStyle = '#0a0e14'; ctx.fillRect(0, dy, W, dialH);\n    ctx.strokeStyle = C.line; ctx.beginPath(); ctx.moveTo(0, dy + 0.5); ctx.lineTo(W, dy + 0.5); ctx.stroke();\n    const cx = W / 2;\n    const spacing = 150;\n    const n = S.stations.length;\n    // physics\n    if (!S.dragDial) {\n      S.pos += S.vel * dt; S.vel *= Math.pow(0.92, dt * 60);\n      const snap = Math.round(S.pos);\n      S.pos += (Math.max(0, Math.min(n - 1, snap)) - S.pos) * Math.min(1, dt * 6);\n    }\n    S.pos = Math.max(-0.49, Math.min(n - 0.51, S.pos));\n    const cur = S.stations[Math.max(0, Math.min(n - 1, Math.round(S.pos)))];\n    // frequency ruler\n    const rulerY = dy + 118;\n    ctx.strokeStyle = '#222a37'; ctx.beginPath(); ctx.moveTo(0, rulerY); ctx.lineTo(W, rulerY); ctx.stroke();\n    for (let i = 0; i < n; i++) {\n      const x = cx + (i - S.pos) * spacing;\n      if (x < -spacing || x > W + spacing) continue;\n      const d = Math.abs(i - S.pos);\n      const a = Math.max(0, 1 - d * 0.30);\n      // tick\n      ctx.strokeStyle = 'rgba(155,140,242,' + (0.3 + a * 0.7) + ')';\n      ctx.lineWidth = d < 0.5 ? 2 : 1;\n      ctx.beginPath(); ctx.moveTo(x, rulerY - 8 - a * 10); ctx.lineTo(x, rulerY + 8 + a * 10); ctx.stroke();\n      // name\n      ctx.font = (d < 0.5 ? '700 13px ' : '500 10px ') + this.GROT;\n      ctx.fillStyle = d < 0.5 ? C.violetHi : 'rgba(139,148,164,' + a + ')';\n      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';\n      ctx.fillText(S.stations[i].name.slice(0, 24), x, rulerY - 16 - a * 8);\n      // count\n      ctx.font = '8px ' + this.MONO; ctx.fillStyle = 'rgba(91,100,114,' + a + ')';\n      ctx.fillText(S.stations[i].count + ' WATCHES', x, rulerY + 22);\n    }\n    // center needle\n    ctx.strokeStyle = C.amberHi; ctx.lineWidth = 2;\n    ctx.beginPath(); ctx.moveTo(cx, rulerY - 30); ctx.lineTo(cx, rulerY + 14); ctx.stroke();\n    // readout\n    ctx.textAlign = 'center';\n    ctx.font = '9px ' + this.MONO; ctx.fillStyle = C.faint;\n    ctx.fillText('STATION ' + (Math.round(S.pos) + 1) + ' / ' + n + ' \\u00b7 DRAG THE DIAL', cx, dy + 16);\n    if (cur && cur.inf) {\n      ctx.font = '9px ' + this.MONO; ctx.fillStyle = C.amber;\n      ctx.fillText('\\u26a1 BLEEDS INTO HIS TEXTS \\u00b7 INFLUENCE ' + cur.inf.influence_score.toFixed(0) + ' \\u00b7 ' + cur.inf.days_active + ' HIGH-BLEED DAYS', cx, dy + 146);\n    } else {\n      ctx.font = '8px ' + this.MONO; ctx.fillStyle = C.faint;\n      ctx.fillText('NO MEASURED LANGUAGE BLEED', cx, dy + 146);\n    }\n    S.dialGeo = { y: dy };\n  }\n  pt_signal(type, p, e) {\n    const S = this.M.signal; if (!S) return;\n    const g = S.dialGeo;\n    if (type === 'down') {\n      if (g && p.y > g.y) { S.dragDial = true; S.vel = 0; }\n    } else if (type === 'move' && S.dragDial && this.mouse.down) {\n      S.pos -= p.dx / 150;\n      S.vel = -p.dx / 150 * 30;\n      S.pos = Math.max(-0.49, Math.min(S.stations.length - 0.51, S.pos));\n    } else if (type === 'up' || type === 'leave') {\n      S.dragDial = false;\n    } else if (type === 'wheel' && g && p.y > g.y) {\n      S.vel += (e.deltaY > 0 ? 1 : -1) * 6;\n    }\n  }\n\n  // ---------- UI builders ----------\n  chipStyle(on, tone) {\n    return {\n      fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '9.5px', letterSpacing: '0.14em',\n      padding: '5px 11px', cursor: 'pointer', border: '1px solid ' + (on ? (tone || '#e8a33d') : '#222a37'),\n      color: on ? (tone || '#e8a33d') : '#6b7484', background: on ? 'rgba(232,163,61,0.08)' : 'rgba(13,17,24,0.85)',\n      transition: 'all 120ms ease', whiteSpace: 'nowrap'\n    };\n  }\n\n  renderVals() {\n    const s = this.state, C = this.COL;\n    const tabDefs = [['pulse', 'PULSE'], ['clock', 'CLOCK'], ['orbits', 'ORBITS'], ['atlas', 'ATLAS'], ['lexicon', 'LEXICON'], ['shelf', 'SHELF'], ['weather', 'WEATHER'], ['annie', 'ANNIE'], ['signal', 'SIGNAL']];\n    const tabs = tabDefs.map(([id, label], i) => ({\n      num: '0' + (i + 1), label,\n      onClick: () => this.setTab(id),\n      style: {\n        fontFamily: \"'IBM Plex Mono', monospace\", fontSize: '10.5px', letterSpacing: '0.16em',\n        padding: '6px 14px', cursor: 'pointer',\n        color: s.tab === id ? '#07090d' : '#8b94a4',\n        background: s.tab === id ? C.amber : 'transparent',\n        border: '1px solid ' + (s.tab === id ? C.amber : '#1d2430'),\n        fontWeight: s.tab === id ? 600 : 400,\n        transition: 'all 130ms ease'\n      }\n    }));\n\n    let chips = [];\n    if (s.tab === 'pulse') {\n      chips = ['FULL', 'NYC ONE', 'UNIONTOWN', 'NYC TWO', 'RETURN'].map(l => ({\n        label: l, onClick: () => this.pulseJump(l), style: this.chipStyle(false)\n      }));\n    } else if (s.tab === 'clock') {\n      chips = [['all', 'ALL'], ['sent', 'SENT'], ['recv', 'RECEIVED']].map(([id, l]) => ({\n        label: l, onClick: () => this.setState({ clockMode: id }), style: this.chipStyle(s.clockMode === id, id === 'recv' ? C.cyan : C.amber)\n      }));\n    } else if (s.tab === 'orbits') {\n      chips = [{ label: 'SCATTER', onClick: () => { if (this.orbitsScatter) this.orbitsScatter(); }, style: this.chipStyle(false) }];\n    } else if (s.tab === 'atlas') {\n      chips = [\n        { label: s.atlasPlay ? '\\u275a\\u275a PAUSE' : '\\u25b6 PLAY', onClick: () => this.setState(st => ({ atlasPlay: !st.atlasPlay })), style: this.chipStyle(s.atlasPlay) },\n        ...[[30, '\\u00d71'], [120, '\\u00d74'], [365, '\\u00d712']].map(([v, l]) => ({\n          label: l, onClick: () => this.setState({ atlasSpeed: v }), style: this.chipStyle(s.atlasSpeed === v)\n        })),\n        ...['FULL', 'FAYETTE', 'NYC'].map(l => ({\n          label: l, onClick: () => { this.setState({ atlasView: l }); if (this.atlasFly) this.atlasFly(l); }, style: this.chipStyle(s.atlasView === l, C.cyan)\n        }))\n      ];\n    } else if (s.tab === 'lexicon') {\n      chips = [['pack', 'CLUSTER'], ['rain', 'RAIN']].map(([id, l]) => ({\n        label: l, onClick: () => { this.setState({ lexMode: id }); if (this.lexSetMode) this.lexSetMode(id); }, style: this.chipStyle(s.lexMode === id)\n      }));\n    } else if (s.tab === 'shelf') {\n      chips = ['ALL', 'MUSIC', 'BOOK', 'MOVIE', 'ART'].map(l => ({\n        label: l, onClick: () => this.setState({ shelfCat: l }), style: this.chipStyle(s.shelfCat === l)\n      }));\n    } else if (s.tab === 'weather') {\n      chips = [\n        ...[['rate', 'RATE'], ['raw', 'RAW']].map(([id, l]) => ({\n          label: l, onClick: () => this.setState({ weatherMode: id }), style: this.chipStyle(s.weatherMode === id)\n        })),\n        ...this.WLAYERS.map(([k, label, col]) => ({\n          label, onClick: () => this.setState(st => ({ weatherLayers: { ...st.weatherLayers, [k]: !st.weatherLayers[k] } })),\n          style: this.chipStyle(s.weatherLayers[k], col)\n        }))\n      ];\n    } else if (s.tab === 'annie') {\n      chips = [\n        { label: s.anniePlay ? '\\u275a\\u275a PAUSE' : '\\u25b6 PLAY', onClick: () => this.setState(st => ({ anniePlay: !st.anniePlay })), style: this.chipStyle(s.anniePlay) },\n        { label: '\\u21ba RESTART', onClick: this.annieRestart, style: this.chipStyle(false) },\n        ...[[0.7, 'SLOW'], [1.4, 'NORMAL'], [4.5, 'FAST']].map(([v, l]) => ({\n          label: l, onClick: () => this.setState({ annieSpeed: v }), style: this.chipStyle(s.annieSpeed === v, this.COL.rose)\n        }))\n      ];\n    } else if (s.tab === 'signal') {\n      chips = [\n        { label: 'ALL WATCHES', onClick: () => this.setState({ signalMusic: false }), style: this.chipStyle(!s.signalMusic, this.COL.violet) },\n        { label: 'MUSIC ONLY', onClick: () => this.setState({ signalMusic: true }), style: this.chipStyle(s.signalMusic, this.COL.violet) }\n      ];\n    }\n\n    const hints = {\n      pulse: 'DRAG TO PAN \\u00b7 SCROLL TO ZOOM \\u00b7 DOUBLE-CLICK TO RESET \\u00b7 MINIMAP IS GRABBABLE \\u00b7 DIAMONDS ARE EVENTS',\n      clock: 'GRAB THE DIAL AND SPIN IT \\u00b7 HOVER A SECTOR \\u00b7 THE NEEDLE SWEEPS A 20-YEAR AVERAGE DAY',\n      orbits: 'GRAB A BODY AND FLING IT \\u00b7 CLICK FOR THE DOSSIER \\u00b7 DISTANCE FROM CENTER = TIME SINCE LAST MESSAGE',\n      atlas: 'SPACE OR \\u25b6 TO REPLAY A DECADE \\u00b7 DRAG THE SCRUBBER \\u00b7 SCROLL TO ZOOM \\u00b7 GRAB THE MAP',\n      lexicon: 'FLICK THE WORDS \\u00b7 CLICK TO PIN ONE \\u00b7 TRY RAIN \\u00b7 SEISMOGRAPH BELOW = ALL-CAPS EVENTS',\n      shelf: 'EVERY DOT IS A RATED WORK \\u00b7 ABOVE THE LINE = LOVED MORE THAN THE WORLD DID \\u00b7 CLICK TO PIN',\n      weather: 'SIX RHETORICAL CHANNELS, STACKED \\u00b7 LIGHTNING = THE 50 MOST INTENSE DAYS \\u00b7 CLICK A BOLT TO ZOOM \\u00b7 SCROLL TO ZOOM',\n      annie: 'PRESS PLAY \\u00b7 FOUR PENS TRACE 44 MONTHS \\u00b7 FRAGMENTS SURFACE AS THE NEEDLE CROSSES THEM \\u00b7 DRAG TO SCRUB',\n      signal: 'HOVER THE SPECTROGRAM \\u00b7 DRAG THE TUNER DIAL THROUGH 40 ARTISTS \\u00b7 \\u26a1 = LANGUAGE BLEED INTO HIS TEXTS'\n    };\n\n    return {\n      loading: s.loading,\n      tabs, chips,\n      hint: hints[s.tab] || '',\n      stageLabel: 'module ' + s.tab,\n      canvasRef: this.canvasRef,\n      cMsgs: this.fmt(s.cnt.m), cThreads: this.fmt(s.cnt.t), cPlaces: this.fmt(s.cnt.p), cKm: this.fmt(s.cnt.k), cWorks: this.fmt(s.cnt.w)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
